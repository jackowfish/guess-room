---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: guess-room
  labels:
    app.kubernetes.io/name: guess-room
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: guess-room
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guess-room
    spec:
      nodeSelector:
        home.jackdecker/node: beefy
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/jackowfish/guess-room:cee5d72 # {"$imagepolicy": "guess-room:app"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: redis://redis:6379
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: guess-room
  labels:
    app.kubernetes.io/name: guess-room
spec:
  selector:
    app.kubernetes.io/name: guess-room
  sessionAffinity: ClientIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
