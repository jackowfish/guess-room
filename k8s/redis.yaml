---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: guess-room
  labels:
    app.kubernetes.io/name: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      nodeSelector:
        home.jackdecker/node: beefy
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - "128mb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 160Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: guess-room
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
